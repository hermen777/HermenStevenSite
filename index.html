<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermen Steven</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav id="navbar">
        <a class="nav-nombre" href="#">Hermen Steven</a>
        <a class="nav-more" href="#seccion_contacto">Contacto</a>
    </nav>

    <!-- HERO -->
    <section>
        <div id="fondo">
            <p id="palabras_aparicion">Hola</p>
            <div id="typewriter">
                <span id="texto-maquina"></span>
                <span id="cursor"></span>
            </div>
        </div>
    </section>

    <!-- PORTAFOLIO -->
    <section>
        <div id="seccion_publicidad">

            <div class="seccion-header reveal">
                <h2 class="seccion-titulo">Publicidad</h2>
                <span class="seccion-num">01</span>
            </div>

            <div class="grid-tarjetas reveal">

                <!-- Imagen -->
                <div class="tarjeta">
                    <img src="resources/images/Ej_Publ_1.png" alt="Publicidad">
                </div>

                <!-- Imagen -->
                <div class="tarjeta">
                    <img src="resources/images/Ej_Publ_2.png" alt="Flyer">
                </div>

                <!-- Imagen -->
                <div class="tarjeta">
                    <img src="resources/images/Ej_Publ_3.png" alt="Flyer">
                </div>

                <!-- Imagen -->
                <div class="tarjeta">
                    <img src="resources/images/Ej_Publ_4.png" alt="Flyer">
                </div>

                <!-- Imagen -->
                <div class="tarjeta">
                    <img src="resources/images/Ej_Publ_4.png" alt="Flyer">
                </div>

            </div>

            <div class="separador"></div>

            <div class="seccion-header reveal">
                <h2 class="seccion-titulo">Sitios web</h2>
                <span class="seccion-num">02</span>
            </div>

            <div class="grid-tarjetas reveal">

                <!-- Video 16:9 -->
                <div class="tarjeta tarjeta-video">
                    <div class="video-wrapper">
                        <video autoplay muted loop playsinline
                            src="resources/videos/video_elchayo_horizontal.mp4">
                        </video>
                        <div class="video-overlay">
                        </div>
                    </div>
                </div>

                <!-- Video 16:9 -->
                <div class="tarjeta tarjeta-video">
                    <div class="video-wrapper">
                        <video autoplay muted loop playsinline
                            src="resources/videos/video_lagordita_horizontal.mp4">
                        </video>
                        <div class="video-overlay">
                        </div>
                    </div>
                </div>

                <!-- Video 16:9 -->
                <div class="tarjeta tarjeta-video">
                    <div class="video-wrapper">
                        <video autoplay muted loop playsinline
                            src="resources/videos/video_estudioGeorge_horizontal.mp4">
                        </video>
                        <div class="video-overlay">
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </section>

    <!-- VER TODOS -->
    <section id="seccion_ver">
        <a class="ver-link" href="https://www.instagram.com/hermensteven.dev/" target="_blank">
            <span class="ver-link-txt">Ver publicidad</span>
            <span class="ver-link-arrow">→</span>
        </a>
        <a class="ver-link" href="https://www.instagram.com/hermensteven.dev/" target="_blank">
            <span class="ver-link-txt">Ver sitios web</span>
            <span class="ver-link-arrow">→</span>
        </a>
    </section>

    <!-- CONTACTO -->
    <section id="seccion_contacto">

        <div class="contacto-titulo-bloque reveal">
            <h2 class="seccion-titulo">Vamos a colaborar</h2>
        </div>

        <div id="contacto-info" class="reveal">
            <a href="mailto:stevendiazhmn@gmail.com" class="contacto-item">
                <span class="contacto-label">Correo electrónico</span>
                <span class="contacto-valor">stevendiazhmn@gmail.com</span>
            </a>
            <a href="https://www.instagram.com/hermensteven.dev/" target="_blank" class="contacto-item">
                <span class="contacto-label">Instagram</span>
                <span class="contacto-valor">@hermensteven.dev</span>
            </a>
        </div>

    </section>

    <!-- FOOTER -->
    <footer id="footer">
        <span class="footer-nombre">Hermen Steven</span>
        <div class="footer-redes">
            <a href="https://www.instagram.com/hermensteven.dev/" target="_blank">Instagram</a>
            <a href="mailto:stevendiazhmn@gmail.com">Correo</a>
        </div>
        <span class="footer-copy">© 2026</span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
